<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Tower - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-card">
      <div class="login-brand">
        <div class="brand-mark"></div>
        <div>
          <p class="eyebrow">J&T Express</p>
          <h1>Control Tower</h1>
          <p class="text-soft">Acesse o painel operacional com segurança.</p>
        </div>
      </div>

      <form id="loginForm" class="login-form" novalidate>
        <div class="field">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seuemail@empresa.com" autocomplete="username" required />
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" placeholder="Digite sua senha" autocomplete="current-password" required />
        </div>

        <button type="submit" id="loginBtn" class="btn-primary btn-block">Entrar</button>
      </form>

      <div id="loginMessage" class="message-box" aria-live="polite"></div>

      <section class="card helper-card compact">
        <h2 class="section-title">Orientação de acesso</h2>
        <p class="text-soft">
          O login usa o e-mail cadastrado no Supabase. Caso o perfil esteja sem permissão, o acesso será bloqueado até o cadastro ser corrigido.
        </p>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="main.js"></script>
</body>
</html>
