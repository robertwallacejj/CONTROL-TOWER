<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Control Tower</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">
  <div class="login-shell">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-mark"></div>
        <div>
          <h1>CONTROL TOWER</h1>
          <p>Monitoramento Operacional</p>
        </div>
      </div>

      <div class="login-title">
        <h2>Acesso ao Painel</h2>
        <span>Entre como administrador ou visualização</span>
      </div>

      <form id="loginForm" class="login-form">
        <div class="field">
          <label for="username">Usuário</label>
          <input type="text" id="username" placeholder="Digite seu usuário" required />
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="Digite sua senha" required />
        </div>

        <button type="submit" class="btn-primary full">Entrar</button>
      </form>

      <button id="guestBtn" class="btn-secondary full">Entrar como visitante</button>

      <div id="loginMessage" class="message-box"></div>

      <div class="login-help">
        <strong>Acessos padrão:</strong>
        <p>Admin: <code>admin</code> / <code>123456</code></p>
        <p>Viewer: <code>viewer</code> / <code>123456</code></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase-config.js"></script>

<script src="main.js"></script>

</body>
</html>
</body>
</html>
